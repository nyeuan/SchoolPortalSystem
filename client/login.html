<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Ives School - Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        school: {
                            green: '#0b4222', // Deep forest green
                            'green-hover': '#072e17',
                            gold: '#b8860b', // Rich gold/amber
                            yellow: '#f4c430', // Bright logo yellow
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-school-green via-[#125730] to-school-yellow flex min-h-screen items-center justify-center p-4 font-serif">

    <div class="w-full max-w-md rounded-2xl bg-[#fcfbf7] p-8 shadow-2xl border border-school-gold/20 relative overflow-hidden">
        
        <div class="absolute top-3 right-3 text-school-green/5 text-xl font-sans">❖ ❖</div>
        <div class="absolute bottom-3 left-3 text-school-green/5 text-xl font-sans">❖ ❖</div>

        <div class="flex flex-col items-center mb-6">
            <img src="stiveslogo.png" alt="St. Ives School Logo" class="h-28 w-28 object-contain drop-shadow-md">
        </div>

        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold tracking-wide text-school-green">St. Ives School - Student Portal</h1>
        </div>

        <form class="space-y-5" action="#" method="POST">
            
            <div>
                <label for="username" class="block text-sm font-medium text-school-green/90">Username</label>
                <div class="mt-1">
                    <input 
                        id="username" 
                        name="username" 
                        type="text" 
                        required 
                        placeholder="Username"
                        class="w-full rounded-lg border-2 border-gray-300 bg-white px-4 py-2.5 text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                    >
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between">
                    <label for="password" class="block text-sm font-medium text-school-green/90">Password</label>
                    <a href="#" class="text-sm font-medium text-school-green hover:text-school-green-hover transition underline underline-offset-2">Forgot password?</a>
                </div>
                <div class="mt-1">
                    <input 
                        id="password" 
                        name="password" 
                        type="password" 
                        required 
                        placeholder="Password"
                        class="w-full rounded-lg border-2 border-gray-300 bg-white px-4 py-2.5 text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                    >
                </div>
            </div>

            <div class="flex items-center justify-between pt-1">
                <div class="flex items-center">
                    <input 
                        id="remember-me" 
                        name="remember-me" 
                        type="checkbox" 
                        class="h-4 w-4 rounded border-gray-300 text-school-green focus:ring-school-green bg-white"
                    >
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
                </div>
                <div>
                    <a href="#" class="text-sm font-medium text-school-green hover:text-school-green-hover transition underline underline-offset-2">Sign up</a>
                </div>
            </div>

            <div class="pt-2">
                <button 
                    type="submit" 
                    class="flex w-full justify-center rounded-lg bg-school-green px-4 py-3 text-lg font-bold text-white shadow-md hover:bg-school-green-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-school-green transition duration-150 active:scale-[0.99]"
                >
                    Log In
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Don't have an account? 
            <a href="register.html" class="font-semibold text-school-green hover:text-school-green-hover underline underline-offset-2 transition">Register</a>
        </p>
    </div>

</body>
</html>
