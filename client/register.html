<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Ives School - Student Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        school: {
                            green: '#0b4222', // Deep forest green
                            'green-hover': '#072e17',
                            gold: '#b8860b', // Rich gold/amber
                            yellow: '#f4c430', // Bright logo yellow
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-school-green via-[#125730] to-school-yellow flex min-h-screen items-center justify-center p-4 sm:p-6 font-serif">

    <div class="w-full max-w-lg rounded-2xl bg-[#fcfbf7] p-6 sm:p-8 shadow-2xl border border-school-gold/20 relative overflow-hidden my-auto">
        
        <div class="absolute top-3 right-3 text-school-green/5 text-xl font-sans">❖ ❖</div>
        <div class="absolute bottom-3 left-3 text-school-green/5 text-xl font-sans">❖ ❖</div>

        <div class="flex flex-col items-center mb-4">
            <img src="stiveslogo.png" alt="St. Ives School Logo" class="h-20 w-20 object-contain drop-shadow-md">
        </div>

        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold tracking-wide text-school-green">Student Registration Portal</h1>
            <p class="mt-1 text-xs sm:text-sm text-gray-600 italic">Begin your journey towards Wisdom and Charity</p>
        </div>

        <form class="space-y-4" action="#" method="POST">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="firstname" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">First Name</label>
                    <div class="mt-1">
                        <input 
                            id="firstname" 
                            name="firstname" 
                            type="text" 
                            required 
                            placeholder="JB"
                            class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                        >
                    </div>
                </div>
                <div>
                    <label for="lastname" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">Last Name</label>
                    <div class="mt-1">
                        <input 
                            id="lastname" 
                            name="lastname" 
                            type="text" 
                            required 
                            placeholder="Suarez"
                            class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                        >
                    </div>
                </div>
            </div>

            <div>
                <label for="student-id" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">Student ID</label>
                <div class="mt-1">
                    <input 
                        id="student-id" 
                        name="student-id" 
                        type="text" 
                        required 
                        placeholder="e.g., 202611112222"
                        class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                    >
                </div>
            </div>

            <div>
                <label for="email" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">Email Address</label>
                <div class="mt-1">
                    <input 
                        id="email" 
                        name="email" 
                        type="email" 
                        required 
                        placeholder="student@stivesschool.edu.ph"
                        class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                    >
                </div>
            </div>


            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="password" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">Password</label>
                    <div class="mt-1">
                        <input 
                            id="password" 
                            name="password" 
                            type="password" 
                            required 
                            placeholder="••••••••"
                            class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                        >
                    </div>
                </div>
                <div>
                    <label for="confirm-password" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">Confirm Password</label>
                    <div class="mt-1">
                        <input 
                            id="confirm-password" 
                            name="confirm-password" 
                            type="password" 
                            required 
                            placeholder="••••••••"
                            class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder-gray-400 shadow-sm transition focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10"
                        >
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4"> 
                <div>
                    <label for="role" class="block text-xs font-medium text-school-green/90 uppercase tracking-wider">Account Role</label>
                    <div class="mt-1 relative">
                        <select 
                            id="role" 
                            name="role" 
                            required 
                            class="w-full rounded-lg border-2 border-gray-300 bg-white px-3 py-3 text-base text-gray-900 shadow-sm transition appearance-none focus:border-school-green focus:outline-none focus:ring-4 focus:ring-school-green/10 cursor-pointer"
                        >
                            <option value="" disabled selected hidden>Choose</option>
                            <option value="student">👨‍🎓 Student</option>
                            <option value="professor">👩‍🏫 Professor</option>
                            <option value="admin">🏢 Admin</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-school-green">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
            </div>

        </form>

        <p class="mt-5 text-center text-sm text-gray-600">
            Already have an account? 
            <a href="login.html" class="font-semibold text-school-green hover:text-school-green-hover underline underline-offset-2 transition">Log In here</a>
        </p>
    </div>

</body>
</html>
